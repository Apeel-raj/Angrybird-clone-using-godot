<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer red crate -->
  <rect x="4" y="4" width="120" height="120" rx="8" fill="#d32f2f" stroke="#5d4037" stroke-width="8"/>
  <!-- Inner panels -->
  <rect x="12" y="12" width="104" height="104" rx="4" fill="#f44336" stroke="#b71c1c" stroke-width="4"/>
  <!-- Yellow-Black warning stripes at top and bottom -->
  <g opacity="0.9">
    <!-- Top banner -->
    <rect x="16" y="16" width="96" height="16" fill="#ffeb3b"/>
    <path d="M 16 32 L 32 16 M 36 32 L 52 16 M 56 32 L 72 16 M 76 32 L 92 16 M 96 32 L 112 16" stroke="#212121" stroke-width="6"/>
    <!-- Bottom banner -->
    <rect x="16" y="96" width="96" height="16" fill="#ffeb3b"/>
    <path d="M 16 112 L 32 96 M 36 112 L 52 96 M 56 112 L 72 96 M 76 112 L 92 96 M 96 112 L 112 96" stroke="#212121" stroke-width="6"/>
  </g>
  <!-- TNT text -->
  <text x="64" y="74" font-family="Impact, Arial Black, sans-serif" font-size="34" font-weight="900" fill="#212121" text-anchor="middle" stroke="#ffffff" stroke-width="2">TNT</text>
  <!-- Board planks details -->
  <line x1="16" y1="50" x2="112" y2="50" stroke="#b71c1c" stroke-width="3"/>
  <line x1="16" y1="80" x2="112" y2="80" stroke="#b71c1c" stroke-width="3"/>
  <line x1="16" y1="16" x2="16" y2="112" stroke="#b71c1c" stroke-width="3"/>
  <line x1="112" y1="16" x2="112" y2="112" stroke="#b71c1c" stroke-width="3"/>
</svg>
