  <path d="M 28 38 L 64 50 L 100 38 L 96 32 L 64 44 L 32 32 Z" fill="#212121"/>
  <!-- Beak -->
  <path d="M 64 52 L 42 72 Q 64 82 86 72 Z" fill="#ffb300" stroke="#ff8f00" stroke-width="3"/>
  <path d="M 45 70 Q 64 72 83 70 C 80 86, 48 86, 45 70 Z" fill="#ffa000" stroke="#ff8f00" stroke-width="2"/>
</svg>
