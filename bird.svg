  <!-- Right Eye Background -->
  <circle cx="80" cy="54" r="16" fill="#ffffff" stroke="#212121" stroke-width="3"/>
  <!-- Left Pupil -->
  <circle cx="52" cy="56" r="5" fill="#000000"/>
  <!-- Right Pupil -->
  <circle cx="76" cy="56" r="5" fill="#000000"/>
