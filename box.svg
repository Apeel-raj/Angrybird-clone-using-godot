<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Wood Block Background -->
  <rect x="4" y="4" width="120" height="120" rx="8" fill="#d7ccc8" stroke="#5d4037" stroke-width="8"/>
  <!-- Inner panels / shading -->
  <rect x="12" y="12" width="104" height="104" rx="4" fill="#a1887f" stroke="#8d6e63" stroke-width="4"/>
  <!-- Diagonal braces (X shape) -->
  <line x1="16" y1="16" x2="112" y2="112" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
  <line x1="112" y1="16" x2="16" y2="112" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
  <!-- Bolts / Screws in corners -->
  <circle cx="20" cy="20" r="4" fill="#4e342e"/>
  <circle cx="108" cy="20" r="4" fill="#4e342e"/>
  <circle cx="20" cy="108" r="4" fill="#4e342e"/>
  <circle cx="108" cy="108" r="4" fill="#4e342e"/>
</svg>
